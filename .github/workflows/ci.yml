name: ci

# PR-time smoke + migrated suite. Runs on every push/PR; budget is
# tight so push latency stays low. Heavier work (full soak, all
# sanitizer variants, coverage) lives in ci-nightly.yml.
#
# This workflow checks out mino-tests with --recurse-submodules, so
# the mino submodule (pinned via .gitmodules) determines the runtime
# under test. Bumping the pin via `./mino/mino task bump-mino vX.Y.Z`
# is the supported way to follow a new mino tag.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Pinned runner labels so a future GHA image bump doesn't
        # silently shift the matrix.
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build mino (from submodule)
        # `make` bootstraps ./mino. `./mino task build-lean` then
        # builds ./mino-lean (the JIT-free distributable binary)
        # so the diff-random quad-byte-id probe can spawn it.
        # Without the lean build the probe sees lean-exit=127
        # for every program and flags every program as a divergence.
        working-directory: mino
        run: |
          make
          ./mino task build-lean

      - name: Dosync-send regression (CI hang #2)
        # Fast regression against the agent worker-spawn / enqueue
        # race fixed in mino v0.381.1. Times out in 30s on any
        # platform where the fix has regressed.
        timeout-minutes: 1
        run: ./mino/mino tests/migrated/dosync_send_repro.clj

      - name: Migrated suite
        run: ./mino/mino tests/run_migrated.clj

      - name: Fault injection
        run: ./mino/mino tests/run_fault_inject.clj

      - name: Adversarial smoke (T1..T11)
        env:
          MINO_BIN: ${{ github.workspace }}/mino/mino
          MINO_LEAN_BIN: ${{ github.workspace }}/mino/mino-lean
        run: ./mino/mino tests/adv/runner.clj --seed 0 --mode smoke

      - name: Differential smoke (diff-test)
        env:
          MINO_BIN: ${{ github.workspace }}/mino/mino
          MINO_LEAN_BIN: ${{ github.workspace }}/mino/mino-lean
        timeout-minutes: 3
        run: ./mino/mino task diff-test

      - name: Upload diff regressions on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diff-regressions-${{ matrix.os }}
          path: tests/adv/regressions/diff-*
          if-no-files-found: ignore

  external-test-suite:
    name: external-test-suite (clojure-test-suite)
    runs-on: ubuntu-24.04
    # Snapshot of jank-lang/clojure-test-suite run against the pinned
    # mino submodule. Each .cljc file runs in its own ./mino sub-process
    # under a 30s timeout (handled by the driver), so a segfault or hang
    # in one file does not take down the rest. Informational: reports
    # supported / failed / errored counts but does not gate merges. This
    # lives here (not in the mino repo) because it depends on external
    # tooling -- the mino vs mino-tests split this repo's README defines.
    continue-on-error: true
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout clojure-test-suite
        uses: actions/checkout@v4
        with:
          repository: jank-lang/clojure-test-suite
          path: clojure-test-suite

      - name: Build mino (from submodule)
        working-directory: mino
        run: make

      - name: Run external suite
        working-directory: mino
        # The driver expects the suite at ../clojure-test-suite (sibling
        # of the mino dir). The checkout above places it at the workspace
        # root, which is exactly that sibling of the mino submodule. tee
        # the output so the next step can pull the summary without
        # re-running the suite.
        run: |
          set -o pipefail
          ./mino tests/clojure_test_suite.clj 2>&1 \
            | tee /tmp/external_suite.log

      - name: Surface aggregate counts
        # Pull the summary block out of the captured log and post it as
        # the job summary so the Actions UI shows pass / fail counts
        # without scrolling.
        if: always()
        run: |
          {
            echo "## External test suite summary"
            echo ''
            echo '```'
            sed -n '/EXTERNAL TEST SUITE REPORT/,/Per-file raw results/p' \
              /tmp/external_suite.log 2>/dev/null \
              | head -100 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
