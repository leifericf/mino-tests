name: ci-nightly

# Heavier work runs once a day. PR-time CI keeps to the smoke set so
# push latency stays low; the nightly job catches:
#   - Adversarial soak (random seed, longer budget)
#   - GC stress under MINO_GC_STRESS=1
#   - Coverage report (clang-only; macos-14 runner has clang+llvm-cov)
#
# A failure here is shown on the actions tab but doesn't block
# anything -- the smoke set is the PR-blocking signal.

on:
  schedule:
    # 05:00 UTC daily, off-peak. 1h after mino's own 04:00 nightly so
    # the submodule pin update flows cleanly if both are scheduled.
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  soak:
    name: soak (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build mino
        # `make` bootstraps ./mino. `./mino task build-lean` then
        # builds ./mino-lean so probes that compare across the
        # auto/on/off/lean quad have a binary to spawn.
        working-directory: mino
        run: |
          make
          ./mino task build-lean

      - name: Adversarial soak
        env:
          MINO_BIN: ${{ github.workspace }}/mino/mino
          MINO_LEAN_BIN: ${{ github.workspace }}/mino/mino-lean
        run: |
          seed=$(date +%s)
          echo "Soak seed: $seed"
          ./mino/mino tests/adv/runner.clj --seed "$seed" --mode soak

      - name: Differential soak (diff-test-soak)
        env:
          MINO_BIN: ${{ github.workspace }}/mino/mino
          MINO_LEAN_BIN: ${{ github.workspace }}/mino/mino-lean
        timeout-minutes: 60
        run: ./mino/mino task diff-test-soak

      - name: Upload diff regressions on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diff-regressions-soak-${{ matrix.os }}
          path: tests/adv/regressions/diff-*
          if-no-files-found: ignore

      - name: GC stress (MINO_GC_STRESS=1)
        run: |
          MINO_GC_STRESS=1 ./mino/mino tests/run_gc_stress.clj
        timeout-minutes: 15

      # ---- GC safeguards (added after the v0.255.6/.7/.8 CI hang ----
      # at transient-survives-gc-yield surfaced how easily a GC bug
      # can hide behind full-suite Heisenbug masking. Each safeguard
      # catches a different shape of bug.

      - name: GC nursery-size fuzz
        # Runs mino tests/run.clj at 4 nursery sizes (64K/256K/1M/4M).
        # Catches bugs sensitive to major-phase × test-position
        # alignment -- varying the nursery shifts where each major
        # falls in the test sequence.
        run: ./mino/mino task gc-fuzz
        timeout-minutes: 15

      - name: GC stress on (gc!)-using subset
        # Runs the curated shard with MINO_GC_STRESS=1 (every alloc
        # forces a full major). Sized for stress mode so it finishes
        # in ~50s rather than tens of minutes.
        run: ./mino/mino task gc-stress-subset
        timeout-minutes: 10

      - name: GC verify (allowed-to-fail)
        # MINO_GC_VERIFY=1 aborts on a barrier-or-remset miss.
        # Currently a tracking signal: the task wraps the abort and
        # always exits 0 until mino's pre-existing barrier-miss
        # sites are also resolved.
        continue-on-error: true
        run: ./mino/mino task gc-verify
        timeout-minutes: 5

      - name: ASan per file
        # One ASan subprocess per mino test file. Catches Heisenbugs
        # that hide under full-suite ASan because cumulative heap
        # state masks the dangerous phase window.
        run: ./mino/mino task asan-per-file
        timeout-minutes: 20

  coverage:
    name: coverage (macos-14, clang)
    runs-on: macos-14
    defaults:
      run:
        shell: bash
    timeout-minutes: 45
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build mino
        # `make` bootstraps ./mino. `./mino task build-lean` then
        # builds ./mino-lean so probes that compare across the
        # auto/on/off/lean quad have a binary to spawn.
        working-directory: mino
        run: |
          make
          ./mino task build-lean

      - name: Coverage pass
        env:
          MINO_BIN: ${{ github.workspace }}/mino/mino
        run: ./mino/mino task adv-test-coverage || echo "(coverage path not yet wired -- Cycle C work)"
